<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexLexHub Admin CMS</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <main>
    <h1>Admin Panel</h1>
    <section>
      <h2>Dashboard Stats</h2>
      <pre id="stats"></pre>
    </section>

    <section>
      <h2>Contributor Applications</h2>
      <pre id="applications"></pre>
    </section>

    <section>
      <h2>Generate Invite Link</h2>
      <form id="inviteForm" class="simple-form">
        <input name="email" placeholder="Invitee Email" required />
        <select name="role"><option>Editor</option><option>Admin</option></select>
        <button type="submit">Generate Invite</button>
      </form>
      <pre id="inviteResult"></pre>
    </section>
  </main>

  <script>
    const headers = { 'X-Role': 'Admin', 'Content-Type': 'application/json' };

    async function load() {
      const stats = await fetch('../backend-php/api/admin.php', { headers }).then(r => r.json());
      document.getElementById('stats').textContent = JSON.stringify(stats, null, 2);

      const apps = await fetch('../backend-php/api/applications.php', { headers }).then(r => r.json());
      document.getElementById('applications').textContent = JSON.stringify(apps, null, 2);
    }

    document.getElementById('inviteForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = Object.fromEntries(new FormData(e.target));
      const result = await fetch('../backend-php/api/invites.php', {
        method: 'POST', headers, body: JSON.stringify(body)
      }).then(r => r.json());
      document.getElementById('inviteResult').textContent = JSON.stringify(result, null, 2);
    });

    load();
  </script>
</body>
</html>
