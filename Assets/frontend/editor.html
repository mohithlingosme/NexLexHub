<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexLexHub Editor</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <main>
    <h1>Editor Panel</h1>

    <section>
      <h2>Create / Submit Content</h2>
      <form id="postForm" class="simple-form">
        <input name="title" placeholder="Title" required />
        <select name="type" required>
          <option value="article">Article</option>
          <option value="case_law">Case Law</option>
          <option value="bare_act">Bare Act</option>
          <option value="whitepaper">Whitepaper</option>
          <option value="news">News</option>
          <option value="law_review">Law Review</option>
        </select>
        <input name="author" placeholder="Author" required />
        <input name="tags" placeholder="Tags (comma-separated)" />
        <select name="status">
          <option value="draft">Save Draft</option>
          <option value="pending">Submit for Approval</option>
        </select>
        <textarea name="content" rows="8" placeholder="Rich text editor placeholder" required></textarea>
        <button type="submit">Save</button>
      </form>
    </section>

    <section>
      <h2>Upload PDF</h2>
      <form id="uploadForm" class="simple-form" enctype="multipart/form-data">
        <input type="file" name="file" accept="application/pdf" required />
        <button type="submit">Upload PDF</button>
      </form>
      <pre id="uploadResult"></pre>
    </section>
  </main>

  <script>
    const roleHeaders = { 'X-Role': 'Editor', 'Content-Type': 'application/json' };

    document.getElementById('postForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = Object.fromEntries(new FormData(e.target));
      const res = await fetch('../backend-php/api/posts.php', {
        method: 'POST', headers: roleHeaders, body: JSON.stringify(body)
      }).then(r => r.json());
      alert(JSON.stringify(res));
    });

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const res = await fetch('../backend-php/api/files.php', {
        method: 'POST',
        headers: { 'X-Role': 'Editor' },
        body: fd
      }).then(r => r.json());
      document.getElementById('uploadResult').textContent = JSON.stringify(res, null, 2);
    });
  </script>
</body>
</html>
