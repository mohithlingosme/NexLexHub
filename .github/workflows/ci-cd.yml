name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            python-service/requirements.txt
            Assets/ai-legal-news-agent/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python-service/requirements.txt
          python -m pip install -r Assets/ai-legal-news-agent/requirements.txt
          python -m pip install ruff

      - name: Lint (ruff)
        run: |
          ruff check \
            tools \
            python-service \
            Assets/ai-legal-news-agent \
            2_embed_store.py \
            3_query_rag.py \
            4_api.py \
            --select F,E9

      - name: Run tests (tools)
        run: |
          python -m unittest -v tools/test_graphify.py

      - name: Run tests (ai-legal-news-agent)
        working-directory: Assets/ai-legal-news-agent
        run: |
          python -m pytest -q

      - name: Smoke import (python-service)
        working-directory: python-service
        run: |
          python -c "import main"

      - name: Package source
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python -c "import pathlib, zipfile; p=pathlib.Path('dist'); p.mkdir(exist_ok=True); z=zipfile.ZipFile(p/'nexlexhub-source.zip','w',zipfile.ZIP_DEFLATED); \
          [z.write(str(f), str(f)) for f in pathlib.Path('.').rglob('*') if '.git' not in f.parts and f.name not in {'.DS_Store'}]; z.close()"

      - name: Upload artifact (source)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: nexlexhub-source
          path: dist/nexlexhub-source.zip
          if-no-files-found: error

  release:
    name: Release (GitHub)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write
    steps:
      - name: Download artifact (source)
        uses: actions/download-artifact@v4
        with:
          name: nexlexhub-source
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/nexlexhub-source.zip
